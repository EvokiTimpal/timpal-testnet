name: TIMPAL CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    name: Python Syntax & Import Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python syntax (all files)
      run: |
        python -m py_compile app/*.py
        python -m py_compile *.py
        echo "All Python files have valid syntax"
    
    - name: Validate imports (catch missing dependencies)
      run: |
        cd app
        python -c "
        import sys
        modules = [
            'block',
            'transaction', 
            'wallet',
            'ledger',
            'mempool',
            'consensus',
            'rewards',
            'config',
            'config_testnet',
            'p2p',
            'p2p_security',
            'vrf',
            'attestation',
            'fork_choice',
            'historical_state',
            'time_slots',
            'validator_economics',
            'device_fingerprint',
            'crypto_utils',
            'key_storage',
            'storage_basic',
            'sqlite_historical_storage',
            'wallet_loader',
            'seed_wallet',
        ]
        failed = []
        for mod in modules:
            try:
                __import__(mod)
                print(f'  [OK] {mod}')
            except Exception as e:
                failed.append((mod, str(e)))
                print(f'  [FAIL] {mod}: {e}')
        
        if failed:
            print(f'\n{len(failed)} module(s) failed to import')
            sys.exit(1)
        else:
            print(f'\nAll {len(modules)} core modules imported successfully')
        "
    
    - name: Validate CLI tools syntax
      run: |
        python -c "import ast; ast.parse(open('wallet_cli.py').read())"
        python -c "import ast; ast.parse(open('validator_cli.py').read())"
        python -c "import ast; ast.parse(open('run_testnet_node.py').read())"
        python -c "import ast; ast.parse(open('run_mainnet_node.py').read())"
        python -c "import ast; ast.parse(open('start_explorer.py').read())"
        echo "All CLI tools have valid syntax"

  basic-validation:
    name: Basic Runtime Validation
    runs-on: ubuntu-latest
    needs: syntax-check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate config values
      run: |
        python -c "
        from app import config, config_testnet
        
        # Validate mainnet config
        assert config.MAX_SUPPLY_TMPL == 250_000_000, 'Max supply must be 250M'
        assert config.BLOCK_TIME == 3, 'Block time must be 3 seconds'
        assert config.EMISSION_PER_BLOCK_PALS == 63_450_000, 'Emission per block incorrect'
        assert config.FEE == 50_000, 'Transaction fee must be 0.0005 TMPL'
        print('Mainnet config values validated')
        
        # Validate testnet config
        assert config_testnet.MAX_SUPPLY_TMPL == 250_000_000, 'Testnet max supply must be 250M'
        assert config_testnet.BLOCK_TIME == 3, 'Testnet block time must be 3 seconds'
        print('Testnet config values validated')
        
        print('All config validations passed')
        "
    
    - name: Validate cryptographic functions
      run: |
        python -c "
        from app.wallet import Wallet
        from app.transaction import Transaction
        from app.block import Block
        
        # Test wallet creation
        wallet = Wallet()
        assert wallet.address.startswith('tmpl'), 'Wallet address must start with tmpl'
        assert len(wallet.address) == 48, 'Wallet address must be 48 chars'
        print(f'Wallet creation OK: {wallet.address[:20]}...')
        
        # Test transaction signing
        tx = Transaction(
            sender=wallet.address,
            recipient='tmpl' + '0' * 44,
            amount=100,
            fee=50000,
            nonce=1
        )
        tx.sign(wallet.private_key)
        assert tx.verify(), 'Transaction signature verification failed'
        print('Transaction signing/verification OK')
        
        print('All cryptographic validations passed')
        "
